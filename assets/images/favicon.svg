<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1a0a2e"/>
      <stop offset="100%" style="stop-color:#0a0a1e"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- خلفية دائرية -->
  <circle cx="32" cy="32" r="31" fill="url(#bg)" stroke="#ff0040" stroke-width="2"/>

  <!-- حروف CN مكدّسة -->
  <text x="32" y="22" text-anchor="middle"
        font-family="Orbitron, monospace" font-size="16" font-weight="900"
        fill="#ff0040" filter="url(#glow)" letter-spacing="2">CO</text>
  <text x="32" y="40" text-anchor="middle"
        font-family="Orbitron, monospace" font-size="16" font-weight="900"
        fill="#00d4ff" filter="url(#glow)" letter-spacing="2">NA</text>

  <!-- خطوط زينة -->
  <line x1="8" y1="31" x2="18" y2="31" stroke="#ff0040" stroke-width="1.5" opacity="0.8"/>
  <line x1="46" y1="31" x2="56" y2="31" stroke="#00d4ff" stroke-width="1.5" opacity="0.8"/>

  <!-- نقطتا الزوايا -->
  <circle cx="10" cy="10" r="2" fill="#ffd700" opacity="0.7"/>
  <circle cx="54" cy="10" r="2" fill="#ffd700" opacity="0.7"/>
  <circle cx="10" cy="54" r="2" fill="#ffd700" opacity="0.7"/>
  <circle cx="54" cy="54" r="2" fill="#ffd700" opacity="0.7"/>

  <!-- خط أسفل CLASSIC -->
  <text x="32" y="54" text-anchor="middle"
        font-family="Orbitron, monospace" font-size="5.5" font-weight="600"
        fill="#ffd700" letter-spacing="2">CLASSIC</text>
</svg>
