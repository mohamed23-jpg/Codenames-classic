<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <radialGradient id="bg-grad" cx="30%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#1a0a2e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0a0a1e;stop-opacity:1"/>
    </radialGradient>
    <pattern id="grid" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(0,212,255,0.06)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1280" height="720" fill="url(#bg-grad)"/>
  <rect width="1280" height="720" fill="url(#grid)"/>
  <!-- glowing circles -->
  <circle cx="200" cy="360" r="300" fill="rgba(255,0,64,0.04)"/>
  <circle cx="1080" cy="200" r="200" fill="rgba(0,212,255,0.04)"/>
  <circle cx="640" cy="720" r="250" fill="rgba(184,41,221,0.03)"/>
  <!-- scan lines -->
  <rect width="1280" height="720" fill="none" style="background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.05) 2px,rgba(0,0,0,0.05) 4px)"/>
  <!-- vertical accent lines -->
  <line x1="0" y1="0" x2="0" y2="720" stroke="#ff0040" stroke-width="2" opacity="0.3"/>
  <line x1="1280" y1="0" x2="1280" y2="720" stroke="#00d4ff" stroke-width="2" opacity="0.3"/>
</svg>
